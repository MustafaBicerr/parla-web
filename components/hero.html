<section class="hero hero-background">
    <!-- Hero Background Carousel -->
    <div class="hero-bg-carousel">
        <div class="carousel-container" style="height: 100%; padding-bottom: 0;">
            <div class="carousel-slide carousel-active" style="background-image: url('/assets/img/hero-background/01.png');"></div>
            <div class="carousel-slide" style="background-image: url('/assets/img/hero-background/02.png');"></div>
            <div class="carousel-slide" style="background-image: url('/assets/img/hero-background/03.png');"></div>
            <div class="carousel-slide" style="background-image: url('/assets/img/sap/sap-1.png');"></div>
        </div>
    </div>

    <!-- Dark Overlay -->
    <div class="hero-overlay"></div>

    <!-- Hero Content Overlay -->
    <div class="container hero-content-stack">
        <div class="hero-carousel-wrapper">
            <button class="carousel-nav prev-btn" id="hero-prev" type="button" data-i18n-aria-label="home.hero.carousel_nav.prev"><i class="fas fa-chevron-left" aria-hidden="true"></i></button>
            <div class="carousel-3d-container" id="hero-3d-carousel">
                <!-- Carousel items will be injected here by JS -->
            </div>
            <button class="carousel-nav next-btn" id="hero-next" type="button" data-i18n-aria-label="home.hero.carousel_nav.next"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
        </div>
        <div class="hero-spotlight-grid">
            <a href="/pages/organisation/sap-implementation.html" class="hero-spotlight-card">
                <p data-i18n="home.hero.spotlights.sap.text"></p>
                <span class="hero-spotlight-btn" data-i18n="home.hero.spotlights.sap.btn"></span>
            </a>
            <a href="/index.html#contact" class="hero-spotlight-card dia-hero-spotlight">
                <p data-i18n="home.hero.spotlights.dia.text"></p>
                <span class="hero-spotlight-btn" data-i18n="home.hero.spotlights.dia.btn"></span>
            </a>
        </div>
    </div>
</section>
